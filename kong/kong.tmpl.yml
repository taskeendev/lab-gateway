# Declarative config ของ Kong (DB-less) — upstream/secret/origin จาก template + env
_format_version: "3.0"

# Upstream = กลุ่มปลายทางของ service + การเช็คสุขภาพ (active probe + passive circuit breaker)
# ถ้า target ตาย เกินเกณฑ์ → ถูก mark unhealthy → Kong หยุดส่ง (วงจรตัด) ตอบ 503 ทันที ไม่ค้าง
upstreams:
  - name: auth-upstream
    targets: [ { target: "${AUTH_TARGET}" } ]
    healthchecks: &hc
      active:
        http_path: /health
        healthy:   { interval: 3, successes: 1 }
        unhealthy: { interval: 3, http_failures: 2, tcp_failures: 2, timeouts: 2 }
      passive:
        healthy:   { successes: 1 }
        unhealthy: { http_failures: 3, tcp_failures: 2, timeouts: 2 }
  - name: feed-upstream
    targets: [ { target: "${FEED_TARGET}" } ]
    healthchecks: *hc
  - name: contact-upstream
    targets: [ { target: "${CONTACT_TARGET}" } ]
    healthchecks: *hc
  - name: presence-upstream
    targets: [ { target: "${PRESENCE_TARGET}" } ]
    healthchecks: *hc

services:
  - name: auth-service
    host: auth-upstream
    routes:
      - name: auth-public
        strip_path: false
        paths: [ /api/auth ]
        plugins:
          - name: rate-limiting
            config: { minute: ${AUTH_RATE_LIMIT_PER_MIN}, policy: local }
      - name: auth-private
        strip_path: false
        paths: [ /api/users, /api/admin ]

  - name: feed-service
    host: feed-upstream
    routes:
      - name: feed
        strip_path: false
        paths: [ /api/posts, /api/comments ]

  - name: contact-service
    host: contact-upstream
    routes:
      - name: contact
        strip_path: false
        paths: [ /api/contact ]

  - name: presence-service
    host: presence-upstream
    routes:
      - name: presence-rest
        strip_path: false
        paths: [ /api/presence ]
      - name: presence-ws
        strip_path: false
        paths: [ /ws/presence ]

plugins:
  - name: jwt-hs512
    config: { secret: ${JWT_SECRET} }
  - name: correlation-id
    config: { header_name: X-Request-Id, generator: uuid, echo_downstream: true }
  - name: cors
    config:
      origins: [${CORS_ORIGINS}]
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Authorization, Content-Type, X-Request-Id]
      exposed_headers: [X-Request-Id]
      credentials: true
      max_age: 3600
  - name: rate-limiting
    config: { minute: ${RATE_LIMIT_PER_MIN}, policy: local }
