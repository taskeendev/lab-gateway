name: lab-gateway

services:
  kong:
    image: kong:3.9
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PLUGINS: "bundled,jwt-hs512"
      KONG_LUA_PACKAGE_PATH: "/kong/plugins/?.lua;;"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: notice
    ports:
      - "${KONG_PROXY_PORT}:8000"
      - "${KONG_ADMIN_PORT}:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
      - ./kong/plugins/jwt-hs512:/kong/plugins/kong/plugins/jwt-hs512:ro
    # ให้ Kong ในคอนเทนเนอร์เรียก service ที่รันบนเครื่องได้ (ทั้ง mac และ linux)
    extra_hosts:
      - "host.docker.internal:host-gateway"
